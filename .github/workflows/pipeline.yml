name: Leadgen BigQuery Pipeline

on:
  # ── Production schedule: 6:00 AM IST = 00:30 UTC ──────────────────────
  schedule:
    - cron: "30 0 * * *"

  # ── Manual trigger with inputs — for testing ──────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "test_auto"
        type: choice
        options:
          - test_auto       # yesterday's date → backup table
          - test_manual     # specific date you type → backup table
          - production      # yesterday's date → main table
      test_date:
        description: "Date to process (YYYY-MM-DD). Only used when mode=test_manual."
        required: false
        default: ""

jobs:
  run-pipeline:
    name: Run Pipeline (${{ github.event.inputs.mode || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # ── Secrets (sensitive) ───────────────────────────────────────
          TRACXN_ACCESS_TOKEN: ${{ secrets.TRACXN_ACCESS_TOKEN }}
          GCP_PROJECT_ID:      ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY:          ${{ secrets.GCP_SA_KEY }}

          # ── Non-sensitive config vars ─────────────────────────────────
          BQ_DATASET:          ${{ vars.BQ_DATASET }}
          BQ_TABLE:            ${{ vars.BQ_TABLE }}
          BQ_TABLE_BACKUP:     ${{ vars.BQ_TABLE_BACKUP }}

          # ── Mode: scheduled runs always use 'production'
          #         manual trigger uses whatever was selected ─────────────
          MODE:      ${{ github.event.inputs.mode || 'production' }}
          TEST_DATE: ${{ github.event.inputs.test_date || '' }}

        run: python pipeline.py

      - name: Print summary
        if: always()
        run: |
          echo "### Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Date Input | ${{ github.event.inputs.test_date || 'N/A (auto)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
